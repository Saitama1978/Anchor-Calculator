name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Debug - List Files
      run: |
        echo "=== Saan nakalagay ang mga file? ==="
        ls -la
        echo "====================================="

    - name: Install Dependencies
      run: |
        if [ -f "pubspec.yaml" ]; then
          flutter pub get
        elif [ -f "Anchor-Calculator/pubspec.yaml" ]; then
          cd Anchor-Calculator && flutter pub get
        else
          echo "Error: Hindi talaga mahanap ang pubspec.yaml!" && exit 1
        fi

    - name: Build APK
      run: |
        if [ -f "pubspec.yaml" ]; then
          flutter build apk --release
        else
          cd Anchor-Calculator && flutter build apk --release
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: |
          build/app/outputs/flutter-apk/app-release.apk
          Anchor-Calculator/build/app/outputs/flutter-apk/app-release.apk
